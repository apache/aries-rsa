name: Build

on:
  pull_request:
    branches:
      - 'master'
  push:
    branches:
      - 'master'

env:
  LC_ALL: en_US.UTF-8

jobs:
  JDKxx_Matrix:
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        java: [ 11, 17, 21, 25 ]
        os: [ ubuntu-latest ]
    name: JDK${{ matrix.java }} ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    steps:
    - name: Git Checkout
      uses: actions/checkout@v6
    - name: Set up Java
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: ${{ matrix.java }}
    - name: Build all
      shell: bash
      run: mvn -U -e -B -ntp clean install
