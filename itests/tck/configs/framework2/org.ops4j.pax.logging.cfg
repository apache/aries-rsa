# Root log level
log4j2.rootLogger.level = WARN

# Console appender (keep it, but quieter)
log4j2.rootLogger.appenderRef.console.ref = console
log4j2.appender.console.type = Console
log4j2.appender.console.name = console
log4j2.appender.console.layout.type = PatternLayout
log4j2.appender.console.layout.pattern = %d{HH:mm:ss.SSS} FW2 %-5p [%t] %c - %m%n

# File appender
log4j2.rootLogger.appenderRef.file.ref = file
log4j2.appender.file.type = RollingFile
log4j2.appender.file.name = file
log4j2.appender.file.fileName = target/framework2.log
log4j2.appender.file.filePattern = target/framework2-%i.log
log4j2.appender.file.layout.type = PatternLayout
log4j2.appender.file.layout.pattern = %d{ISO8601} %-5p [%t] %c - %m%n
log4j2.appender.file.policies.type = Policies
log4j2.appender.file.policies.size.type = SizeBasedTriggeringPolicy
log4j2.appender.file.policies.size.size = 100MB
log4j2.appender.file.strategy.type = DefaultRolloverStrategy
log4j2.appender.file.strategy.max = 5

# Per-package overrides
log4j2.logger.aries.name = org.apache.aries.rsa
log4j2.logger.aries.level = WARN
